# Challenge specification for ctfcli
# https://github.com/CTFd/ctfcli
name: "signature"
author: "author"
category: "cryptography"
description: |
  Vous avez reçu plusieurs messages de votre commandant.\n
  Vous suspectez un intrus dans votre équipe qui se fait passer pour votre commandant.\n
  Le flag est la concatenation dans l'ordre croissant des identifiants (1 chiffre suivit de 3 lettres) des messages qui proviennent réellement de votre commandant.\n
  Par exemple: si les messages authentiques ont les identifiants suivant: '2csw', '7vhw' et '7dmm'. Le flag sera: '2csw7dmm7vhw'
attribution: "Written by [author](https://ctfd.io)"
value: 100
type: standard

image: null
protocol: null
host: null

# Optional settings
connection_info: null
attempts: 0

logic: any

tags:
