description: |
  Vous avez trouvé un fichier contenant beaucoup d'adresse bitcoin, votre addresse y figure (le flag).
  Problème vous ne vous souvenez plus exactement de votre adresse exacte, vous vous souvenez uniquement que:
  - Le flag contient '1'
  - Le flag contient '9'
  - Le flag se termine par le charactère 0x55
  - Le flag contient plus de 17 majuscules


