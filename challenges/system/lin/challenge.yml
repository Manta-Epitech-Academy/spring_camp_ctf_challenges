# Challenge specification for ctfcli
# https://github.com/CTFd/ctfcli

name: "Linux"
author: "author"
category: system
description: |
  Monsieur Seguin suspecte qu'un programme malveillant a été installé sur son ordinateur Linux
  Trouvez le programme malveillant et trouvez le flag (dans le code source du programme).
    ---
  - Téléchargez le fichier **linux3_x86.img.zip**
  - Décompressez l'archive ZIP
  - Rendez vous sur [https://lab.epitech.academy/v86_simple/](https://lab.epitech.academy/v86_simple/)
  - Dans **Image de disque dur** choissisez le fichier **linux3_x86.img** (contenu dans **linux3_x86.img.zip**)
  - Cliquez sur **Lancer** et attendez que la machine démarre (quelques secondes à quelques minutes en fonction des performances de votre machine).

