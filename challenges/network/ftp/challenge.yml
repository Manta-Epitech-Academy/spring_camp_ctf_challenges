  - "Utilisez un analyseur de trafic pour analyser le fichier pcap: PacketSafari, Wireshark, etc."
  - "RETR est la commande utilisée pour récupérer un fichier sur un serveur FTP"
  - "Le trafic est bruité, il faut filtrer les paquets pour ne garder que les paquets de FTP"

